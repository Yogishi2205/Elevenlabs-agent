# Render Blueprint: static site for VoiceOps (HTML + CSS + JS)
# Docs: https://render.com/docs/blueprint-spec
#
# After pushing this file to your default branch, use Render:
#   New → Blueprint → connect repo → leave "Blueprint Path" empty (uses render.yaml at root)

services:
  - type: web
    name: elevenlabs-voiceops
    runtime: static
    plan: free
    buildCommand: "echo 'Static files — no build'"
    staticPublishPath: .
